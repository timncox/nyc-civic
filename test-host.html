<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Civic Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; }
    .loading { color: #888; font-family: system-ui; padding: 40px; text-align: center; font-size: 14px; }
    .loading.error { color: #ef4444; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading">Connecting to NYC Civic server...</div>
  <iframe id="app" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>

  <script>
    const SERVER = 'http://localhost:3001/mcp';
    let sessionId = null;

    async function mcpRequest(method, params, id) {
      const headers = {
        'Content-Type': 'application/json',
        'Accept': 'application/json, text/event-stream'
      };
      if (sessionId) headers['mcp-session-id'] = sessionId;
      const body = { jsonrpc: '2.0', method, params };
      if (id !== undefined) body.id = id;
      const res = await fetch(SERVER, { method: 'POST', headers, body: JSON.stringify(body) });
      const sid = res.headers.get('mcp-session-id');
      if (sid) sessionId = sid;
      if (res.status === 202) return null;
      return res.json();
    }

    async function boot() {
      const loadingEl = document.getElementById('loading');
      const frameEl = document.getElementById('app');

      try {
        // Connect
        await mcpRequest('initialize', {
          protocolVersion: '2025-11-25',
          capabilities: {},
          clientInfo: { name: 'nyc-civic-host', version: '1.0.0' }
        }, 0);
        await mcpRequest('notifications/initialized');

        loadingEl.textContent = 'Loading dashboard...';

        // Get the app HTML
        const resourceResp = await mcpRequest('resources/read', {
          uri: 'ui://civic-dashboard/mcp-app.html'
        }, 1);
        const html = resourceResp?.result?.contents?.[0]?.text;

        if (!html) throw new Error('No app HTML returned');

        // Inject a script that bridges tool calls from the iframe back to our server
        const bridgeScript = `
          <script>
            // Override the App's callServerTool to use our parent's MCP session
            window.__mcpServer = '${SERVER}';
            window.__mcpSessionId = '${sessionId}';
          <\/script>
        `;

        // Load the app
        frameEl.srcdoc = html;
        frameEl.style.display = 'block';
        loadingEl.style.display = 'none';

      } catch(e) {
        loadingEl.textContent = 'Error: ' + e.message;
        loadingEl.className = 'loading error';
      }
    }

    boot();
  </script>
</body>
</html>
